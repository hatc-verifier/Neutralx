<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Parts Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" alt="Logo" class="h-10">
                <h1 class="text-xl font-black uppercase">Neutral<span class="text-red-600">X</span></h1>
            </div>
            <div class="text-slate-600 text-xl"><i class="fas fa-shopping-cart text-red-600"></i></div>
        </div>
    </nav>

    <div class="container mx-auto p-4 md:p-10">
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
            </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/90 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden relative shadow-2xl">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-gray-200 w-8 h-8 rounded-full">&times;</button>
            <img id="modalImg" src="" class="w-full h-64 object-contain bg-gray-50 border-b">
            <div class="p-6">
                <h2 id="modalTitle" class="text-2xl font-bold"></h2>
                <p id="modalPrice" class="text-red-600 font-bold text-2xl my-2"></p>
                <p id="modalDesc" class="text-gray-600 text-sm mb-6"></p>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 flex items-center justify-center gap-2 transition-all">
                    <i class="fab fa-whatsapp"></i> WhatsApp অর্ডার করুন
                </button>
            </div>
        </div>
    </div>

    <script src="products.js"></script>

    <script>
        const container = document.getElementById('product-container');
        let currentPName = "";

        // Display Products
        myProducts.forEach(product => {
            container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:shadow-lg transition flex flex-col h-full">
                    <img onclick="openDetails('${product.name}', '${product.price}', '${product.image}', '${product.details}')" 
                         src="${product.image}" class="w-full h-40 object-cover cursor-pointer hover:opacity-90">
                    <div class="p-3 text-center flex-grow flex flex-col justify-between">
                        <div>
                            <h4 class="font-bold text-sm text-slate-800">${product.name}</h4>
                            <p class="text-red-600 font-bold mt-1">${product.price}</p>
                        </div>
                        <button onclick="directOrder('${product.name}', '${product.price}')" 
                                class="w-full mt-3 bg-slate-900 text-white py-2 rounded-lg text-xs font-bold hover:bg-red-600 transition uppercase">
                            Buy Now
                        </button>
                    </div>
                </div>
            `;
        });

        function openDetails(name, price, img, desc) {
            currentPName = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeDetails() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() {
            directOrder(currentPName, document.getElementById('modalPrice').innerText);
        }
    </script>
</body>
</html>
