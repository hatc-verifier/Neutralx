<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Premium Motorcycle Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .bg-custom-dark { background-color: #0b0f19; } /* Premium Dark for Header/Footer */
        .card-shadow:hover { box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white sticky top-0 z-50 border-b border-slate-100 py-3">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" class="h-8 md:h-10">
                <span class="text-xl md:text-2xl font-black tracking-tighter uppercase">Neutral<span class="text-red-600">X</span></span>
            </div>
            
            <nav class="hidden md:flex gap-6 text-[11px] font-bold uppercase tracking-widest text-slate-500">
                <a href="#" class="text-red-600">Home</a>
                <a href="#shop" class="hover:text-red-600 transition">Shop</a>
                <a href="#footer" class="hover:text-red-600 transition">Contact</a>
            </nav>

            <div class="flex items-center gap-3">
                <i class="fas fa-search text-slate-400 cursor-pointer hover:text-red-600 transition"></i>
                <div class="relative cursor-pointer">
                    <i class="fas fa-shopping-cart text-lg"></i>
                    <span class="absolute -top-2 -right-2 bg-red-600 text-white text-[9px] w-4 h-4 flex items-center justify-center rounded-full font-bold">0</span>
                </div>
            </div>
        </div>
    </header>

    <section class="bg-custom-dark py-10 md:py-16 text-center text-white border-b-4 border-red-600">
        <div class="container mx-auto px-4 max-w-2xl">
            <h2 class="text-2xl md:text-4xl font-black uppercase mb-2 tracking-tight">Upgrade Your Ride</h2>
            <p class="text-slate-400 text-[10px] md:text-xs uppercase tracking-[0.2em]">High-Quality Motorcycle Parts & Accessories</p>
        </div>
    </section>

    <main id="shop" class="container mx-auto px-4 py-12 md:py-16">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-1.5 h-7 bg-red-600 rounded-full"></div>
            <h3 class="text-xl font-black uppercase tracking-tight text-slate-800">Latest Collection</h3>
        </div>

        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-slate-900/95 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-2xl overflow-hidden relative shadow-2xl transition-all border border-slate-100">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-slate-800 text-2xl z-10 hover:bg-red-500 hover:text-white transition">&times;</button>
            <div class="bg-gray-50 p-8 md:p-12 flex items-center justify-center border-b border-gray-100">
                <img id="modalImg" src="" class="max-h-60 object-contain drop-shadow-lg">
            </div>
            <div class="p-8">
                <h2 id="modalTitle" class="text-2xl font-black text-slate-900 mb-2 uppercase tracking-tight"></h2>
                <p id="modalPrice" class="text-red-600 font-black text-3xl mb-5"></p>
                <div class="bg-gray-50 p-5 rounded-2xl border-l-4 border-red-600 mb-8">
                    <p id="modalDesc" class="text-slate-600 text-xs leading-relaxed font-medium"></p>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-green-600 transition-all flex items-center justify-center gap-3 active:scale-95 text-sm uppercase tracking-widest">
                    <i class="fab fa-whatsapp text-xl"></i> Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/8801303842242" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl z-50 hover:scale-110 transition-all">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <footer id="footer" class="bg-custom-dark text-white pt-20 pb-10 mt-12 border-t border-slate-800">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-3xl font-black tracking-tighter uppercase mb-4">Neutral<span class="text-red-600">X</span></h1>
            <p class="text-slate-500 text-sm max-w-sm mx-auto mb-10 tracking-widest uppercase font-bold">Motorcycle Parts Supplier</p>
            
            <div class="flex justify-center gap-10 mb-12 text-slate-400">
                <a href="https://www.facebook.com/share/18Phw7BBeV/" target="_blank" class="hover:text-blue-500 transition text-2xl"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@neutralx42" target="_blank" class="hover:text-black transition text-2xl"><i class="fab fa-tiktok"></i></a>
            </div>

            <div class="flex justify-center gap-8 text-[10px] font-bold text-slate-600 uppercase mb-10 tracking-widest">
                <a href="#">Home</a>
                <a href="#shop">Shop</a>
                <a href="#footer">Contact</a>
            </div>
            
            <p class="text-[9px] text-slate-700 uppercase tracking-[0.4em] font-black border-t border-slate-900 pt-10">© 2026 NEUTRALX | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <script src="products.js"></script>
    <script>
        const container = document.getElementById('product-container');
        let currentProduct = null;

        myProducts.forEach(product => {
            container.innerHTML += `
                <div class="card-shadow bg-white rounded-2xl border border-slate-100 overflow-hidden flex flex-col h-full group transition-all duration-300">
                    <div class="relative bg-gray-50 h-40 md:h-52 p-4 cursor-pointer overflow-hidden flex items-center justify-center" onclick="openDetails('${product.id}')">
                        <img src="${product.image}" class="max-h-full max-w-full object-contain group-hover:scale-105 transition-transform duration-500">
                        <span class="absolute top-3 left-3 bg-red-600 text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase shadow-lg tracking-wider">Hot</span>
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h4 class="font-bold text-[10px] md:text-xs text-slate-800 mb-1 truncate uppercase">${product.name}</h4>
                        <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                            <p class="text-red-600 font-black text-sm">${product.price}</p>
                            <span class="text-[8px] text-green-600 font-bold uppercase flex items-center gap-1">
                                <span class="w-1 h-1 bg-green-500 rounded-full animate-pulse"></span> ${product.stock || 'In Stock'}
                            </span>
                        </div>
                        <button onclick="directOrder('${product.name}', '${product.price}')" class="w-full bg-slate-900 text-white py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest hover:bg-red-600 transition shadow-lg active:scale-95">Buy Now</button>
                    </div>
                </div>
            `;
        });

        function openDetails(id) {
            const product = myProducts.find(p => p.id == id);
            currentProduct = product;
            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalPrice').innerText = product.price;
            document.getElementById('modalImg').src = product.image;
            document.getElementById('modalDesc').innerText = product.details;
            document.getElementById('productModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() {
            if(currentProduct) directOrder(currentProduct.name, currentProduct.price);
        }
    </script>
</body>
</html>
