<!DOCTYPE html>

</head>
<body class="bg-gray-50 font-sans text-slate-900">

    <nav class="bg-white shadow-sm sticky top-0 z-50 py-3">

                </div>

    <section class="container mx-auto px-4 mt-6">
        <div class="bg-slate-900 rounded-3xl p-8 md:p-16 text-white text-center shadow-xl border-b-4 border-red-600">
            <span class="bg-red-600 text-[10px] font-bold px-3 py-1 rounded-full mb-4 inline-block uppercase tracking-widest">Premium Quality</span>
            <h2 class="text-3xl md:text-6xl font-black mb-4 leading-tight">UPGRADE YOUR RIDE</h2>
            <p class="text-gray-400 max-w-xl mb-8 text-sm md:text-lg mx-auto">বেস্ট কোয়ালিটির মোটরসাইকেল পার্টস এখন NeutralX-এ।</p>
        </div>
    </section>

    <main class="container mx-auto px-4 py-12">
        <h3 class="text-2xl font-black mb-8 border-l-4 border-red-600 pl-3 uppercase italic">Collection</h3>
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl overflow-hidden relative shadow-2xl">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-gray-100 w-10 h-10 rounded-full flex items-center justify-center text-2xl z-10 hover:bg-red-100 hover:text-red-600">&times;</button>
            <div class="bg-gray-50 p-6 flex items-center justify-center">
                <img id="modalImg" src="" class="max-h-72 object-contain">
            </div>
            <div class="p-8">
                <h2 id="modalTitle" class="text-2xl font-black mb-2 uppercase"></h2>
                <p id="modalPrice" class="text-red-600 font-black text-2xl mb-4"></p>
                <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed mb-8 bg-gray-50 p-4 rounded-xl"></p>
                <button onclick="confirmOrder()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-3">
                    <i class="fab fa-whatsapp text-xl"></i> WhatsApp Order
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-slate-900 text-white py-12 mt-20">
        <div class="container mx-auto px-4 text-center">
            <h1 class="text-2xl font-black mb-4 uppercase">Neutral<span class="text-red-600">X</span></h1>
            <div class="flex justify-center gap-8 text-gray-400 mb-8 text-3xl">
                <a href="https://www.facebook.com/share/18Phw7BBeV/" target="_blank" class="hover:text-blue-500"><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@neutralx42?_r=1&_t=ZS-94bmxQGyNTE" target="_blank" class="hover:text-pink-500"><i class="fab fa-tiktok"></i></a>
            </div>
            <div class="border-t border-slate-800 pt-8 text-[10px] text-gray-600 uppercase">
                © 2025 NEUTRALX LTD | ALL RIGHTS RESERVED
            </div>
        </div>
    </footer>

    <a href="https://wa.me/8801303842242" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="products.js"></script>
    <script>
        const container = document.getElementById('product-container');
        let currentPName = "";

        myProducts.forEach(product => {
            container.innerHTML += `
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden group">
                    <div class="relative bg-gray-50 h-44 md:h-60 p-4 cursor-pointer" onclick="openDetails('${product.name}', '${product.price}', '${product.image}', '${product.details}')">
                        <img src="${product.image}" class="w-full h-full object-contain transition-transform group-hover:scale-110">
                    </div>
                    <div class="p-4">
                        <h4 class="font-bold text-sm mb-1 truncate">${product.name}</h4>
                        <div class="flex justify-between items-center mb-4">
                            <p class="text-red-600 font-black text-lg">${product.price}</p>
                            <span class="text-[10px] text-green-600 font-bold uppercase">${product.stock}</span>
                        </div>
                        <button onclick="directOrder('${product.name}', '${product.price}')" class="w-full bg-slate-900 text-white py-2 rounded-xl text-xs font-bold hover:bg-red-600 transition uppercase">Buy Now</button>
                    </div>
                </div>
            `;
        });

        function openDetails(name, price, img, desc) {
            currentPName = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('productModal').classList.add('hidden'); }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() { directOrder(currentPName, document.getElementById('modalPrice').innerText); }
    </script>
</body>
</html>
