<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Premium Bike Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .bg-banner-slim { background-color: #111827; }
        .bg-footer-blue { background-color: #0f172a; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-white font-sans text-slate-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" class="h-8 md:h-9">
                <span class="text-xl font-black uppercase tracking-tighter text-slate-900">Neutral<span class="text-red-600">X</span></span>
            </div>
            <div class="flex items-center gap-4 text-gray-500">
                <i class="fas fa-search cursor-pointer"></i>
                <i class="fas fa-shopping-cart text-lg"></i>
            </div>
        </div>
    </header>

    <section class="bg-banner-slim py-6 text-center text-white">
        <div class="container mx-auto px-4">
            <h2 class="text-lg md:text-2xl font-black uppercase tracking-widest italic inline-block border-b-2 border-red-600 pb-1">
                Upgrade Your Ride
            </h2>
            <nav class="mt-4 flex justify-center gap-6 text-[9px] font-bold uppercase tracking-[0.2em] text-gray-400">
                <a href="#" class="hover:text-red-500 transition">Home</a>
                <a href="#shop" class="hover:text-red-500 transition">Shop</a>
                <a href="#footer" class="hover:text-red-500 transition">Contact</a>
            </nav>
        </div>
    </section>

    <main id="shop" class="container mx-auto px-4 py-10">
        <div class="flex items-center gap-2 mb-8 border-l-4 border-red-600 pl-3">
            <h3 class="text-lg font-black uppercase tracking-tight text-gray-800">Latest Collection</h3>
        </div>

        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            </div>
    </main>

    <footer id="footer" class="bg-footer-blue text-white pt-12 pb-6">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center gap-8 mb-6 text-gray-400">
                <a href="https://www.facebook.com/share/18Phw7BBeV/" class="hover:text-blue-500 text-xl transition"><i class="fab fa-facebook-f"></i></a>
                <a href="https://www.tiktok.com/@neutralx42" class="hover:text-white text-xl transition"><i class="fab fa-tiktok"></i></a>
            </div>
            <p class="text-[9px] text-gray-500 font-bold uppercase tracking-[0.3em] mb-4">NeutralX | Premium Quality Parts</p>
            <div class="border-t border-slate-800 pt-6">
                <p class="text-[8px] text-gray-700 font-bold uppercase tracking-[0.4em]">© 2026 NEUTRALX LTD | ALL RIGHTS RESERVED</p>
            </div>
        </div>
    </footer>

    <a href="https://wa.me/8801303842242" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-2xl z-50 hover:scale-110 transition-all">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <div id="productModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl overflow-hidden relative shadow-2xl">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center text-xl hover:bg-red-500 hover:text-white transition">&times;</button>
            <div class="bg-gray-50 p-6 flex items-center justify-center border-b">
                <img id="modalImg" src="" class="h-44 object-contain">
            </div>
            <div class="p-6">
                <h2 id="modalTitle" class="text-xl font-black text-gray-900 mb-1 uppercase tracking-tight"></h2>
                <div id="modalPriceContainer" class="mb-4"></div>
                <p id="modalDesc" class="text-gray-500 text-[11px] leading-relaxed mb-6 bg-gray-50 p-3 rounded-lg border-l-2 border-red-600"></p>
                <button onclick="confirmOrder()" class="w-full bg-gray-900 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 text-xs uppercase tracking-widest hover:bg-green-600 transition-all">
                    <i class="fab fa-whatsapp text-lg"></i> Buy on WhatsApp
                </button>
            </div>
        </div>
    </div>

    <script src="products.js"></script>
    <script>
        const container = document.getElementById('product-container');
        let currentProduct = null;

        if (typeof myProducts !== 'undefined') {
            myProducts.forEach(product => {
                const numericPrice = parseInt(product.price.replace(/[^0-9]/g, '')) || 0;
                // ২০০ টাকা ক্রস প্রাইস মেইনটেইন করা হচ্ছে
                const fakeOldPrice = numericPrice + 180000;

                container.innerHTML += `
                    <div class="product-card bg-white rounded-2xl border border-gray-100 overflow-hidden flex flex-col h-full shadow-sm">
                        <div class="relative bg-gray-50 h-40 md:h-48 p-4 cursor-pointer flex items-center justify-center" onclick="openDetails('${product.id}')">
                            <img src="${product.image}" class="max-h-full max-w-full object-contain">
                            
                            <div class="absolute top-2 left-2">
                                <span class="bg-red-600 text-white text-[6px] font-black px-1.5 py-0.5 rounded uppercase shadow-sm">Hot</span>
                            </div>
                            <div class="absolute top-2 right-2">
                                <span class="bg-green-500 text-white text-[6px] font-black px-1.5 py-0.5 rounded uppercase shadow-sm">In Stock</span>
                            </div>
                        </div>
                        <div class="p-4 flex flex-col flex-grow text-center">
                            <h4 class="font-bold text-[10px] text-gray-800 mb-1 uppercase tracking-tight truncate">${product.name}</h4>
                            <div class="flex justify-center items-center gap-2 mb-3">
                                <span class="text-gray-400 line-through text-[10px]">৳${fakeOldPrice}</span>
                                <span class="text-red-600 font-black text-sm">${product.price}</span>
                            </div>
                            <button onclick="directOrder('${product.name}', '${product.price}')" class="w-full bg-gray-900 text-white py-2 rounded-lg text-[9px] font-bold uppercase tracking-widest hover:bg-red-600 transition">Buy Now</button>
                        </div>
                    </div>
                `;
            });
        }

        function openDetails(id) {
            const product = myProducts.find(p => p.id == id);
            currentProduct = product;
            const numericPrice = parseInt(product.price.replace(/[^0-9]/g, '')) || 0;
            const fakeOldPrice = numericPrice + 200;

            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalPriceContainer').innerHTML = `
                <span class="text-gray-400 line-through text-sm mr-2">৳${fakeOldPrice}</span>
                <span class="text-red-600 font-black text-2xl">${product.price}</span>
            `;
            document.getElementById('modalImg').src = product.image;
            document.getElementById('modalDesc').innerText = product.details;
            document.getElementById('productModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() {
            if(currentProduct) directOrder(currentProduct.name, currentProduct.price);
        }
    </script>
</body>
</html>
