<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Minimalist Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900">

    <header class="bg-white sticky top-0 z-50 border-b border-slate-100">
        <div class="container mx-auto px-4 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" class="h-7">
                <span class="text-xl font-black tracking-tighter uppercase">Neutral<span class="text-red-600">X</span></span>
            </div>
            
            <nav class="flex gap-5 text-[11px] font-bold uppercase tracking-widest text-slate-500">
                <a href="#" class="text-red-600">Home</a>
                <a href="#shop" class="hover:text-red-600 transition">Shop</a>
                <a href="#footer" class="hover:text-red-600 transition">Contact</a>
            </nav>
        </div>
    </header>

    <section class="bg-slate-900 py-6">
        <div class="container mx-auto px-4 text-center">
            <h2 class="text-white text-lg md:text-xl font-bold uppercase tracking-widest">Upgrade Your Ride</h2>
            <div class="h-1 w-12 bg-red-600 mx-auto mt-2 rounded-full"></div>
        </div>
    </section>

    <main id="shop" class="container mx-auto px-4 py-10">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-1 h-6 bg-red-600"></div>
            <h3 class="text-lg font-black uppercase tracking-tight">Latest Collection</h3>
        </div>

        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
            </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-2xl overflow-hidden relative animate-modal shadow-2xl">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-slate-100 w-8 h-8 rounded-full flex items-center justify-center text-slate-800 text-lg z-10 hover:bg-red-500 hover:text-white transition">&times;</button>
            <div class="bg-slate-50 p-8 flex items-center justify-center border-b">
                <img id="modalImg" src="" class="h-44 object-contain drop-shadow-lg">
            </div>
            <div class="p-6">
                <h2 id="modalTitle" class="text-xl font-black text-slate-900 mb-1 uppercase tracking-tight"></h2>
                <p id="modalPrice" class="text-red-600 font-black text-2xl mb-4"></p>
                <div class="bg-slate-50 p-4 rounded-xl border-l-4 border-red-600 mb-6">
                    <p id="modalDesc" class="text-slate-600 text-[11px] leading-relaxed"></p>
                </div>
                <button onclick="confirmOrder()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold flex items-center justify-center gap-2 text-xs uppercase tracking-widest hover:bg-green-600 transition-all active:scale-95">
                    <i class="fab fa-whatsapp text-lg"></i> Buy on WhatsApp
                </button>
            </div>
        </div>
    </div>

    <footer id="footer" class="bg-white py-12 border-t mt-10">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center gap-8 mb-8">
                <a href="https://www.facebook.com/share/18Phw7BBeV/" target="_blank" class="text-2xl text-slate-300 hover:text-blue-600 transition"><i class="fab fa-facebook"></i></a>
                <a href="https://www.tiktok.com/@neutralx42" target="_blank" class="text-2xl text-slate-300 hover:text-black transition"><i class="fab fa-tiktok"></i></a>
            </div>
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-[0.3em]">© 2025 NEUTRALX LTD | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <a href="https://wa.me/8801303842242" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white w-14 h-14 rounded-full flex items-center justify-center shadow-2xl hover:scale-110 transition-all z-50">
        <i class="fab fa-whatsapp text-3xl"></i>
    </a>

    <script src="products.js"></script>
    <script>
        const container = document.getElementById('product-container');
        let currentProduct = null;

        myProducts.forEach(product => {
            container.innerHTML += `
                <div class="product-card bg-white rounded-2xl border border-slate-100 overflow-hidden flex flex-col h-full">
                    <div class="relative bg-slate-50 h-40 md:h-52 p-4 cursor-pointer overflow-hidden flex items-center justify-center" onclick="openDetails('${product.id}')">
                        <img src="${product.image}" class="max-h-full max-w-full object-contain">
                        <span class="absolute top-3 left-3 bg-red-600 text-white text-[8px] font-black px-2 py-0.5 rounded-full uppercase">Hot</span>
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h4 class="font-bold text-[10px] md:text-xs text-slate-800 mb-1 truncate uppercase">${product.name}</h4>
                        <div class="flex justify-between items-center mb-4 flex-wrap">
                            <p class="text-red-600 font-black text-sm">${product.price}</p>
                            <span class="text-[8px] text-green-600 font-bold uppercase flex items-center gap-1">
                                <span class="w-1 h-1 bg-green-500 rounded-full"></span> ${product.stock || 'In Stock'}
                            </span>
                        </div>
                        <button onclick="directOrder('${product.name}', '${product.price}')" class="w-full bg-slate-900 text-white py-2.5 rounded-lg text-[9px] font-bold uppercase tracking-widest hover:bg-red-600 transition">Buy Now</button>
                    </div>
                </div>
            `;
        });

        function openDetails(id) {
            const product = myProducts.find(p => p.id == id);
            currentProduct = product;
            document.getElementById('modalTitle').innerText = product.name;
            document.getElementById('modalPrice').innerText = product.price;
            document.getElementById('modalImg').src = product.image;
            document.getElementById('modalDesc').innerText = product.details;
            document.getElementById('productModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('productModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() {
            if(currentProduct) directOrder(currentProduct.name, currentProduct.price);
        }
    </script>
</body>
</html>
