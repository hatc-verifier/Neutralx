<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Motorcycle Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <div class="bg-slate-900 text-white py-2 px-4 text-xs flex justify-between">
        <span><i class="fas fa-phone"></i> 01303-842242</span>
        <span><i class="fas fa-envelope"></i> infucelkayes0@gmail.com</span>
    </div>

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" alt="NeutralX" class="h-10">
                <h1 class="text-xl font-bold uppercase tracking-tight">Neutral<span class="text-red-600">X</span></h1>
            </div>
            <div class="flex gap-4 text-gray-600">
                <i class="fas fa-search"></i>
                <i class="fas fa-shopping-cart text-red-600"></i>
            </div>
        </div>
    </nav>

    <div class="bg-slate-800 text-white py-12 px-6 text-center">
        <h2 class="text-3xl font-bold mb-2 uppercase">Premium Parts Store</h2>
        <p class="text-gray-400 text-sm mb-6 uppercase">Quality is our Priority</p>
    </div>

    <div class="container mx-auto p-6">
        <h3 class="text-lg font-bold mb-6 border-l-4 border-red-600 pl-2 uppercase">New Arrivals</h3>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            
            <div onclick="openDetails('Custom Engine Part', '৳ ১৫,০০০', '29173.jpg', 'এটি একটি প্রিমিয়াম কোয়ালিটির ইঞ্জিন পার্ট। টেকসই এবং হাই-পারফরম্যান্স নিশ্চিত করে।')" class="bg-white rounded-lg shadow cursor-pointer hover:shadow-lg transition overflow-hidden">
                <img src="29173.jpg" class="w-full h-40 object-cover bg-gray-100">
                <div class="p-3">
                    <h4 class="font-bold text-sm truncate">Custom Engine Part</h4>
                    <p class="text-red-600 font-bold mt-1 text-sm">৳ ১৫,০০০</p>
                    <button class="w-full mt-3 bg-slate-100 text-slate-800 py-1 rounded text-xs font-bold hover:bg-red-600 hover:text-white">View Details</button>
                </div>
            </div>

            </div>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-70 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-xl overflow-hidden relative">
            <button onclick="closeDetails()" class="absolute top-3 right-3 text-gray-500 text-2xl">&times;</button>
            <img id="modalImg" src="" class="w-full h-64 object-contain bg-gray-50">
            <div class="p-6">
                <h2 id="modalTitle" class="text-2xl font-bold text-slate-800"></h2>
                <p id="modalPrice" class="text-red-600 font-black text-xl my-2"></p>
                <div class="bg-green-100 text-green-700 text-xs font-bold px-2 py-1 inline-block rounded mb-4">In Stock</div>
                <p id="modalDesc" class="text-gray-600 text-sm leading-relaxed mb-6"></p>
                
                <button onclick="confirmOrder()" class="w-full bg-red-600 text-white py-3 rounded-lg font-bold shadow-lg hover:bg-red-700 flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> Confirm Order via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <footer class="bg-slate-900 text-gray-500 py-10 text-center text-xs mt-20 uppercase tracking-widest">
        © 2025 NeutralX Motorcycle Parts
    </footer>

    <script>
        let currentProduct = "";

        function openDetails(name, price, img, desc) {
            currentProduct = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeDetails() {
            document.getElementById('productModal').classList.add('hidden');
        }

        function confirmOrder() {
            const msg = `হ্যালো NeutralX! আমি এই প্রোডাক্টটি কিনতে চাই: ${currentProduct}। আমার মোবাইল নম্বর দিয়ে অর্ডার কনফার্ম করতে চাই।`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
