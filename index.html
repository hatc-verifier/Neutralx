<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeutralX | Premium Parts</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        /* ছোট ব্যানারের জন্য কাস্টম ডিজাইন */
        .mini-hero {
            background: linear-gradient(to right, #0f172a, #1e293b);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 py-3">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <img src="29173.jpg" class="h-8">
                <h1 class="text-xl font-black tracking-tighter uppercase">Neutral<span class="text-red-600">X</span></h1>
            </div>
            <div class="flex gap-4 text-[10px] font-bold uppercase text-slate-600">
                <a href="#" class="text-red-600">Home</a>
                <a href="#shop" class="hover:text-red-600 transition">Shop</a>
                <a href="#footer" class="hover:text-red-600 transition">Contact</a>
            </div>
        </div>
    </nav>

    <header class="container mx-auto px-4 mt-4">
        <div class="mini-hero text-center text-white border-b-2 border-red-600">
            <h2 class="text-lg md:text-2xl font-black uppercase">Premium Motorcycle Accessories</h2>
            <p class="text-gray-400 text-[10px] tracking-[0.2em] mt-1">ESTD 2025 | QUALITY GUARANTEED</p>
        </div>
    </header>

    <main id="shop" class="container mx-auto px-4 py-6">
        <h3 class="text-sm font-black mb-6 border-l-4 border-red-600 pl-2 uppercase italic text-slate-800">Collection</h3>
        <div id="product-container" class="grid grid-cols-2 md:grid-cols-4 gap-4">
            </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-xl overflow-hidden relative shadow-2xl">
            <button onclick="closeDetails()" class="absolute top-4 right-4 bg-gray-100 w-8 h-8 rounded-full text-xl z-10">&times;</button>
            <div class="bg-gray-50 p-6 flex items-center justify-center">
                <img id="modalImg" src="" class="h-40 object-contain">
            </div>
            <div class="p-6">
                <h2 id="modalTitle" class="text-base font-black text-slate-900 mb-1 uppercase"></h2>
                <p id="modalPrice" class="text-red-600 font-black text-lg mb-4"></p>
                <p id="modalDesc" class="text-gray-600 text-[10px] mb-6 leading-relaxed bg-gray-50 p-3 rounded-lg"></p>
                <button onclick="confirmOrder()" class="w-full bg-slate-900 text-white py-3 rounded-lg font-bold flex items-center justify-center gap-2 text-[10px] uppercase tracking-widest">
                    <i class="fab fa-whatsapp"></i> Buy via WhatsApp
                </button>
            </div>
        </div>
    </div>

    <footer id="footer" class="bg-white py-12 border-t mt-10">
        <div class="container mx-auto px-4 text-center">
            <div class="flex justify-center gap-10 mb-8">
                <a href="https://www.facebook.com/share/18Phw7BBeV/" target="_blank" class="text-2xl text-slate-300 hover:text-blue-600 transition">
                    <i class="fab fa-facebook"></i>
                </a>
                <a href="https://www.tiktok.com/@neutralx42?_r=1&_t=ZS-94bmxQGyNTE" target="_blank" class="text-2xl text-slate-300 hover:text-black transition">
                    <i class="fab fa-tiktok"></i>
                </a>
            </div>
            <p class="text-[9px] text-gray-400 uppercase tracking-[0.3em]">© 2025 NEUTRALX LTD | ALL RIGHTS RESERVED</p>
        </div>
    </footer>

    <a href="https://wa.me/8801303842242" target="_blank" class="fixed bottom-6 right-6 bg-green-500 text-white w-12 h-12 rounded-full flex items-center justify-center shadow-2xl z-50 hover:scale-110 transition">
        <i class="fab fa-whatsapp text-2xl"></i>
    </a>

    <script src="products.js"></script>
    <script>
        const container = document.getElementById('product-container');
        let currentPName = "";

        myProducts.forEach(product => {
            container.innerHTML += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="bg-gray-50 h-36 p-3 cursor-pointer" onclick="openDetails('${product.name}', '${product.price}', '${product.image}', '${product.details}')">
                        <img src="${product.image}" class="w-full h-full object-contain">
                    </div>
                    <div class="p-3">
                        <h4 class="font-bold text-[9px] mb-1 truncate uppercase">${product.name}</h4>
                        <div class="flex justify-between items-center mb-3">
                            <p class="text-red-600 font-black text-xs">${product.price}</p>
                            <span class="text-[7px] text-green-600 font-bold uppercase">${product.stock || 'In Stock'}</span>
                        </div>
                        <button onclick="directOrder('${product.name}', '${product.price}')" class="w-full bg-slate-900 text-white py-2 rounded-lg text-[8px] font-bold uppercase tracking-wider">Buy Now</button>
                    </div>
                </div>
            `;
        });

        function openDetails(name, price, img, desc) {
            currentPName = name;
            document.getElementById('modalTitle').innerText = name;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalImg').src = img;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('productModal').classList.remove('hidden');
        }

        function closeDetails() { document.getElementById('productModal').classList.add('hidden'); }

        function directOrder(name, price) {
            const msg = `হ্যালো NeutralX!\nআমি এটি কিনতে চাই:\n📦 ${name}\n💰 দাম: ${price}`;
            window.open(`https://wa.me/8801303842242?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function confirmOrder() { directOrder(currentPName, document.getElementById('modalPrice').innerText); }
    </script>
</body>
</html>
